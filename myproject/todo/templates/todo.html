<!doctype html>
<html>
<head>
    <title>ToDo list</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">My TODO list</h2>

<!-- ✅ ADD TASK FORM -->

<form method="POST" class="mb-4">
    {% csrf_token %}

    <div class="input-group">

        <input type="text"
               name="title"
               class="form-control"
               placeholder="Enter new task"
               required>

        <button class="btn btn-primary">
            Add Task
        </button>

    </div>

</form>


<!-- ✅ TASK LIST -->

<ul class="list-group">

{% for i in tasks %}

<li class="list-group-item d-flex justify-content-between align-items-center">

<div>

<!-- ✅ Update Checkbox -->

<form method="POST"
      action="{% url 'update_task' i.id %}"
      style="display:inline;">

{% csrf_token %}

<input type="checkbox"
       name="completed"
       onchange="this.form.submit()"

{% if i.completed %}
checked
{% endif %}
>

</form>

<span class="ms-2">

{{ i.title }}

</span>

</div>


<!-- ✅ Buttons Section -->

<div>

<!-- ✏️ EDIT BUTTON -->

<a href="{% url 'edit_task' i.id %}"
   class="btn btn-warning btn-sm">
   ✏ Edit
</a>

<!-- 🗑 DELETE BUTTON -->

<a href="{% url 'delete_task' i.id %}"
   class="btn btn-danger btn-sm">
   🗑 Delete
</a>

</div>

</li>

{% endfor %}

</ul>

</div>

</body>
</html>
